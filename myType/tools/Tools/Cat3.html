<!DOCTYPE html>
<html lang="ja">
<head>
  <title>Cat3</title>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="Cat3.css">
</head>
<body>

  <!-- タイトル -->
  <div class="titlebar">
    <h1>Cat3</h1>
  </div>

  <!-- ===== 3カラムエディタ ===== -->
  <div class="editor-group">

    <!-- 左 -->
    <div class="editor-block">
      <p class="status">
        <span id="filename(0)">File: (none)</span>
        <span id="modified(0)"></span>
        <span id="linecount(0)">Line: 1</span>
        <span id="charcount(0)">Chars: 0</span>
      </p>

      <div class="toolbar">
	      <button type="button" onclick="clearFile(0)">Clear</button>
			  <button type="button" onclick="loadFile(0)">Load</button>
			  <button type="button" onclick="cleanFile(0)">Clean</button>
			  <button type="button" id="save0" onclick="saveFile(0)">Save</button>
			  <button type="button" onclick="saveAs(0)">Save As</button>
      </div>

      <textarea id="text0" class="text"></textarea>
    </div>

    <!-- 中央 -->
    <div class="editor-block">
      <p class="status">
        <span id="filename(1)">File: (none)</span>
        <span id="modified(1)"></span>
        <span id="linecount(1)">Line: 1</span>
        <span id="charcount(1)">Chars: 0</span>
      </p>

      <div class="toolbar">
	      <button type="button" onclick="clearFile(1)">Clear</button>
			  <button type="button" onclick="loadFile(1)">Load</button>
			  <button type="button" onclick="cleanFile(1)">Clean</button>
			  <button type="button" id="save1" onclick="saveFile(1)">Save</button>
			  <button type="button" onclick="saveAs(1)">Save As</button>
        <button type="button" onclick="mergeFiles()">→｜←</button>
      </div>

      <textarea id="text1" class="text"></textarea>
    </div>

    <!-- 右 -->
    <div class="editor-block">
      <p class="status">
        <span id="filename(2)">File: (none)</span>
        <span id="modified(2)"></span>
        <span id="linecount(2)">Line: 1</span>
        <span id="charcount(2)">Chars: 0</span>
      </p>

      <div class="toolbar">
	      <button type="button" onclick="clearFile(2)">Clear</button>
			  <button type="button" onclick="loadFile(2)">Load</button>
			  <button type="button" onclick="cleanFile(2)">Clean</button>
			  <button type="button" id="save2" onclick="saveFile(2)">Save</button>
			  <button type="button" onclick="saveAs(2)">Save As</button>
      </div>

      <textarea id="text2" class="text"></textarea>
    </div>

  </div>

  <!-- JS -->
  <script src="Cat3.js"></script>

</body>
</html>
