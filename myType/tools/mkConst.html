<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="const.css">
  <title>mkConst</title>
<style>

</style>
</head>
<body>
<h1>タイプ練習設定</h1>
  <div class="controls">
    <label for="START_MSG_INPUT">開始:</label>
    <input list="START_MSG_LIST" id="START_MSG_INPUT" name="START_MSG" value="Enter⏎でスタート" 
           onmousedown="this.value=''" 
           onfocus="this.value=''">
    <datalist id="START_MSG_LIST">
      <option value="Enter⏎でスタート">
      <option value="Enter⏎">
      <option value="Enter">
      <option value="⏎">
    </datalist>
<br><br>
    <label for="INPUT_MSG_INPUT">入力:</label>
    <input list="INPUT_MSG_LIST" id="INPUT_MSG_INPUT" name="INPUT_MSG" value="英数 かな" 
           onmousedown="this.value=''" 
           onfocus="this.value=''">
    <datalist id="INPUT_MSG_LIST">
      <option value="英数　かな">
      <option value="英数　確認">
      <option value="かな　確認">
      <option value="かなキー">
      <option value="英数キー">
    </datalist>
<br><br>
    <label for="RANDOM_INPUT">問数:</label>
    <input list="RANDOM_LIST" id="RANDOM_INPUT" name="RANDOM" value="0" 
           onmousedown="this.value=''" 
           onfocus="this.value=''">
    <datalist id="RANDOM_LIST">
      <option value="0">
      <option value="10">
      <option value="20">
    </datalist>
<br><br>
    <label for="WIDTH_INPUT">横幅:</label>
    <input list="WIDTH_LIST" id="WIDTH_INPUT" name="WIDTH" value="15em" 
           onmousedown="this.value=''" 
           onfocus="this.value=''">
    <datalist id="WIDTH_LIST">
      <option value="2em">
      <option value="10em">
      <option value="15em">
      <option value="20em">
      <option value="25em">
      <option value="30em">
    </datalist>
<br><br>
    <button type="button" onclick="composeText()">合成する</button>
  </div>

<textarea id="result_area" placeholder="ここに合成されます...">
&lt;!-------10--------20--------30--------40--------&gt;
&lt;textarea id="txtdata" hidden&gt;

&lt;/textarea&gt;
&lt;!-------10--------20--------30--------40--------&gt;
</textarea>

<script>
function composeText() {
  // 1. 各項目の値を取得
  const startMsg = document.getElementById('START_MSG_INPUT').value;
  const inputMsg = document.getElementById('INPUT_MSG_INPUT').value;
  const randomVal = document.getElementById('RANDOM_INPUT').value;
  const widthVal = document.getElementById('WIDTH_INPUT').value;

  // 2. テキストエリアの要素を取得
  const textArea = document.getElementById('result_area');

  // 3. 追加したい「const部分」だけを組み立てる
const configText = `<script>
const START_MSG = "${startMsg}";
const INPUT_MSG = "${inputMsg}";
const RANDOM = "${randomVal}";
const WIDTH = "${widthVal}";
<\/script>\n`;
  const textVal = textArea.value;

  textArea.value = configText+ textVal;
}
  </script>

</body>
</html>
