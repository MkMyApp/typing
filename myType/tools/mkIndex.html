<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>HTMLファイル一覧</title>
<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

button {
  flex: 0 0 auto;
  margin: 0.5em;
  align-self: flex-start;
}

textarea {
  flex: 1;
  width: calc(100% - 2em);
  margin: 1em;
  box-sizing: border-box;
}

.drop-hover {
  outline: 3px solid #4a90e2;
  background: #eef6ff;
}
</style>
</head>
<body>

<button id="btnLoad">フォルダを選んで一覧作成</button>
<textarea id="output" placeholder="ここへフォルダをドラッグ＆ドロップ"></textarea>

<script>
async function buildHtmlListFromDirectoryHandle(dirHandle) {
  const files = [];

  for await (const [name, handle] of dirHandle.entries()) {
    if (handle.kind === "file") {
      if (name.toLowerCase().endsWith(".html") && name.toLowerCase() !== "index.html") {
        const file = await handle.getFile();
        files.push({
          name: name,
          modified: file.lastModified
        });
      }
    }
  }

  files.sort((a, b) => b.modified - a.modified);

  let result = "";
  for (const file of files) {
    const title = file.name.replace(/\.html$/i, "");
    result += `<p><a href="${file.name}">${title}</a></p>\n`;
  }

  return { files, result };
}

async function listHtmlFiles() {
  const textarea = document.getElementById("output");
  textarea.value = "";

  try {
    const dirHandle = await window.showDirectoryPicker();
    const { files, result } = await buildHtmlListFromDirectoryHandle(dirHandle);

    textarea.value = result;
    alert("完了：" + files.length + "件");
  } catch (err) {
    console.error(err);
    alert("キャンセルしたか、対応していないブラウザです。");
  }
}

document.getElementById("btnLoad").addEventListener("click", listHtmlFiles);

const output = document.getElementById("output");

output.addEventListener("dragover", (e) => {
  e.preventDefault();
  output.classList.add("drop-hover");
});

output.addEventListener("dragleave", () => {
  output.classList.remove("drop-hover");
});

output.addEventListener("drop", async (e) => {
  e.preventDefault();
  output.classList.remove("drop-hover");
  output.value = "";

  try {
    const item = e.dataTransfer.items[0];
    if (!item) {
      alert("何もドロップされていません。");
      return;
    }

    if (item.getAsFileSystemHandle) {
      const handle = await item.getAsFileSystemHandle();

      if (!handle || handle.kind !== "directory") {
        alert("フォルダをドロップしてください。");
        return;
      }

      const { files, result } = await buildHtmlListFromDirectoryHandle(handle);
      output.value = result;
      alert("完了：" + files.length + "件");
      return;
    }

    const entry = item.webkitGetAsEntry?.();
    if (!entry || !entry.isDirectory) {
      alert("このブラウザではフォルダのドロップに対応していないか、フォルダではありません。");
      return;
    }

    alert("このブラウザでは互換APIでの再帰処理が必要です。Chromium系なら getAsFileSystemHandle() が使えることがあります。");
  } catch (err) {
    console.error(err);
    alert("フォルダの読み取りに失敗しました。");
  }
});
</script>

</body>
</html>
