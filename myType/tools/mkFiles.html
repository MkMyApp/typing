<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>HTMLファイル一覧</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ツールバー部分を横並びに */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0.5em;
    flex-wrap: wrap;
  }

  .radio-group {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.9em;
  }

  textarea {
    flex: 1;
    width: calc(100% - 2em);
    margin: 1em;
    box-sizing: border-box;
  }

  .drop-hover {
    outline: 3px solid #4a90e2;
    background: #eef6ff;
  }
</style>
</head>
<body>

<div class="toolbar">
  <button id="btnLoad">フォルダを選んで一覧作成</button>
  
  <div class="radio-group">
    <input type="radio" id="Link" name="answer" value="link" checked>
    <label for="Link">リンク</label>
  </div>
  
  <div class="radio-group">
    <input type="radio" id="File" name="answer" value="file">
    <label for="File">ネーム</label>
  </div>
</div>

<textarea id="output" placeholder="ここへフォルダをドラッグ＆ドロップ"></textarea>

<script>
async function buildHtmlListFromDirectoryHandle(dirHandle) {
  const files = [];
  // ラジオボタンの状態を取得
  const isLinkMode = document.getElementById("Link").checked;

  for await (const [name, handle] of dirHandle.entries()) {
    if (handle.kind === "file") {
      if (name.toLowerCase().endsWith(".html") && name.toLowerCase() !== "index.html") {
        const file = await handle.getFile();
        files.push({
          name: name,
          modified: file.lastModified
        });
      }
    }
  }

  files.sort((a, b) => b.modified - a.modified);

  let result = "";
  for (const file of files) {
    if (isLinkMode) {
      // リンクが選択されている場合
      const title = file.name.replace(/\.html$/i, "");
      result += `<p><a href="${file.name}">${title}</a></p>\n`;
    } else {
      // ネームが選択されている場合
      result += `'${file.name}',\n`;
    }
  }

  return { files, result };
}

async function listHtmlFiles() {
  const textarea = document.getElementById("output");
  textarea.value = "";

  try {
    const dirHandle = await window.showDirectoryPicker();
    const { files, result } = await buildHtmlListFromDirectoryHandle(dirHandle);

    textarea.value = result;
    alert("完了：" + files.length + "件");
  } catch (err) {
    if (err.name !== 'AbortError') {
      console.error(err);
      alert("エラーが発生したか、対応していないブラウザです。");
    }
  }
}

document.getElementById("btnLoad").addEventListener("click", listHtmlFiles);

const output = document.getElementById("output");

output.addEventListener("dragover", (e) => {
  e.preventDefault();
  output.classList.add("drop-hover");
});

output.addEventListener("dragleave", () => {
  output.classList.remove("drop-hover");
});

output.addEventListener("drop", async (e) => {
  e.preventDefault();
  output.classList.remove("drop-hover");
  output.value = "";

  try {
    const item = e.dataTransfer.items[0];
    if (!item) {
      alert("何もドロップされていません。");
      return;
    }

    if (item.getAsFileSystemHandle) {
      const handle = await item.getAsFileSystemHandle();

      if (!handle || handle.kind !== "directory") {
        alert("フォルダをドロップしてください。");
        return;
      }

      const { files, result } = await buildHtmlListFromDirectoryHandle(handle);
      output.value = result;
      alert("完了：" + files.length + "件");
      return;
    }

    alert("このブラウザではフォルダのドロップに対応していない可能性があります。");
  } catch (err) {
    console.error(err);
    alert("フォルダの読み取りに失敗しました。");
  }
});
</script>

</body>
</html>
