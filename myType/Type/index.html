<!doctype html>
<html lang="ja">
<head>
	<meta charset="utf-8">
	<link rel="stylesheet" href="index.css">
	<title>タイピングメニュー</title>
</head>
<body>
<script>
  let timer = setTimeout(function() {
    location.href = "type.html";
  }, 10000);

  function stopMove() {
    clearTimeout(timer);
    document.getElementById("msg").textContent = "移動停止";
  }
</script>
<div>
<h1>タイプ練習</h1>
<p id="msg">
  10秒後にtypeに移動
  <button onclick="stopMove()">停止</button>
</p>
<p><a href="type.html">タイプ</a></p>
<p><a href=".html"></a></p>
<p><a href=".html"></a></p>

<p><a href=".html"></a></p>
</div>
</body>
</html>
