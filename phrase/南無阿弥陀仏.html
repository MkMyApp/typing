南無阿弥陀仏（なむあみだぶつ）
【浄土宗・浄土真宗など】
これを唱えることを「念仏（ねんぶつ）」と言います。
意味：「阿弥陀仏という仏様に、すべてをおまかせして帰依します」という宣言です。
阿弥陀仏とは：無限の光（知恵）と無限の命（慈悲）を持つ仏様です。「どんなに罪深い人間でも、阿弥陀仏の名を呼べば、死後に極楽浄土へ救い上げる」という誓い（本願）を立てたとされています。
背景：「自分自身の力（自力）で悟りを開くのは難しいが、仏様の力（他力）を信じて名前を呼べば救われる」という教えが、平安時代末期から鎌倉時代にかけて、庶民の間に爆発的に広まりました。
