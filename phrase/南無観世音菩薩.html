【観音信仰全般】
「観音様、どうぞお救いください」という祈りの言葉です。
意味：苦難に遭ったとき、その名を唱えれば観音様がただちにその声を聞きつけ（観音）、救ってくれると説かれています。
リズム：流れるようなリズムで、真言よりもなじみ深い響きを持つため、多くの宗派で唱えられます。
