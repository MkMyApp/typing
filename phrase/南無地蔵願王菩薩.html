南無地蔵願王菩薩（なむじぞうがんおうぼさつ）
【地蔵信仰】
お地蔵様に帰依する言葉です。
意味：子供の守護や、地獄で苦しむ人々を救う強い願い（願）を持つ王としての敬称が含まれています。
日本で最も有名な二つの「唱え言葉」について解説します。これらはどちらも「南無（なむ）」から始まりますが、その後の対象が「仏様個人」か「教え（経典）」かという大きな違いがあります。
